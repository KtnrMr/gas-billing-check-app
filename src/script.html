<script>
(function() {
  var UI_BUILD = '0.4.8';
  var state = {
    targetMonth: '',
    month: null,
    dashboard: null,
    adjustments: [],
    cashMaster: [],
    inputTargets: [],
    reconcile: [],
    history: [],
    nameConfirmed: [],
    currentListTab: '入力対象',
    editable: true,
    loadedScreens: {},
    honobonoBilling: null,
    honobonoDraft: {
      rows: [],
      pastOnlyRows: [],
      removedPastOnly: [],
      serverPastOnlyIds: [],
      dirtyMatchIds: {},
      dirtyPastOnlyIds: {},
      dirtyMemoIds: {},
      dirty: false
    },
    billingSearchTimer: null,
    billingSearchKeyword: '',
    cashSearchTimer: null,
    cashSearchKeyword: '',
    eshuInputRows: []
  };

  var pendingRequests = 0;

  function $(id) { return document.getElementById(id); }

  function showMessage(text, type) {
    var el = $('message');
    el.textContent = text;
    el.className = 'message ' + (type || 'info');
    el.hidden = false;
  }

  function clearMessage() { $('message').hidden = true; }

  function setLoading(isLoading) {
    $('loading').hidden = !isLoading;
  }

  function beginLoading(showOverlay) {
    pendingRequests += 1;
    if (showOverlay) setLoading(true);
  }

  function endLoading(showOverlay) {
    pendingRequests = Math.max(0, pendingRequests - 1);
    if (showOverlay && pendingRequests === 0) setLoading(false);
  }

  function runServerEx(method, args, showOverlay) {
    if (showOverlay) clearMessage();
    beginLoading(showOverlay);
    return new Promise(function(resolve, reject) {
      var runner = google.script.run
        .withSuccessHandler(function(result) {
          endLoading(showOverlay);
          resolve(result);
        })
        .withFailureHandler(function(error) {
          endLoading(showOverlay);
          if (showOverlay) showMessage(error.message || String(error), 'error');
          reject(error);
        });
      if (typeof runner[method] !== 'function') {
        endLoading(showOverlay);
        var missingMsg = 'サーバー関数「' + method + '」が利用できません。GASでデプロイを「新バージョン」に更新してください。';
        if (showOverlay) showMessage(missingMsg, 'error');
        reject(new Error(missingMsg));
        return;
      }
      runner[method].apply(runner, args);
    });
  }

  function runServer(method) {
    var args = Array.prototype.slice.call(arguments, 1);
    return runServerEx(method, args, true);
  }

  function runServerSilent(method) {
    var args = Array.prototype.slice.call(arguments, 1);
    return runServerEx(method, args, false);
  }

  function getActiveReconcileWrapId() {
    return 'reconcile-table-wrap';
  }

  function formatBillingAmount(record) {
    if (record.isMonthlyStop) return '当月停止';
    return formatYen(record.finalAmount);
  }

  function formatReconcileAmount(value) {
    if (normalizeDisplayText_(value) === '当月停止') return '当月停止';
    if (value === '' || value == null) return '';
    return formatYen(value);
  }

  function normalizeDisplayText_(value) {
    return String(value == null ? '' : value).replace(/\s+/g, '').trim();
  }

  function handleImportError(error) {
    showMessage((error && error.message) || String(error), 'error');
  }

  function applyImportResult(result, label) {
    if (!result) return false;
    if (result.month) {
      state.month = result.month;
      renderFromState();
    }
    if (result.reconcile && Array.isArray(result.reconcile.rows)) {
      state.reconcile = result.reconcile.rows;
      renderReconcileTable(state.reconcile);
    }
    var importCount = result.count;
    var reconcileCount = result.reconcile ? result.reconcile.count : 0;
    if (importCount != null) {
      showMessage(
        label + ' ' + importCount + '件を取込しました。照合結果 ' + reconcileCount + '件。',
        'success'
      );
      return true;
    }
    if (reconcileCount > 0) {
      showMessage('照合結果 ' + reconcileCount + '件。', 'success');
      return true;
    }
    return false;
  }
  function formatYen(value) {
    var num = Number(value) || 0;
    return num.toLocaleString('ja-JP') + '円';
  }

  function defaultTargetMonthValue() {
    var d = new Date();
    d.setMonth(d.getMonth() - 1);
    return d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2);
  }

  function currentMonthValue() {
    return $('target-month').value;
  }

  function resolveTargetMonth() {
    var month = currentMonthValue() || state.targetMonth;
    if (month) state.targetMonth = month;
    return month;
  }

  function requireTargetMonth() {
    var month = resolveTargetMonth();
    if (!month) {
      showMessage('対象月を選択してください。', 'error');
      return '';
    }
    return month;
  }

  function isEditable() {
    return state.editable && state.month && state.month.status !== '確定済';
  }

  function updateEditableUi() {
    var editable = isEditable();
    $('honobono-import-button').disabled = !editable;
    $('honobono-save-button').disabled = !editable || !state.honobonoDraft.dirty;
    $('eshu-import-button').disabled = !editable;
    $('reconcile-button').disabled = !editable;
    $('confirm-button').disabled = !editable || !state.month || state.month.status === '確定済';
    $('unconfirm-button').disabled = !state.month || state.month.status !== '確定済';
    $('month-status').textContent = state.month
      ? state.targetMonth + ' / ' + state.month.status
      : '未読込';
  }

  function renderSummary() {
    renderSummaryCards('honobono-summary-cards');
  }

  function renderSummaryCards(wrapId) {
    var wrap = $(wrapId);
    if (!wrap) return;
    if (!state.dashboard) {
      wrap.innerHTML = '';
      return;
    }
    var s = state.dashboard && state.dashboard.summary;
    if (!s) {
      wrap.innerHTML = '';
      return;
    }
    var cards = [
      ['ほのぼの取込', (s.honobonoImportCount || s.honobonoCount || 0) + '件', formatYen(s.honobonoImportTotal || s.honobonoTotal || 0)],
      ['請求件数', (s.billingCount != null ? s.billingCount : s.totalBillingCount || 0) + '件', formatYen(s.totalBillingAmount || 0)],
      ['合算請求', (s.combinedCount || 0) + '件', formatYen(s.combinedAmount || 0)],
      ['過去分のみ', (s.pastOnlyCount || 0) + '件', formatYen(s.pastOnlyAmount || 0)],
      ['現金支払い', (s.cashCount || 0) + '件', formatYen(s.cashTotal || s.cashAmount || 0)],
      ['当月停止', (s.monthlyStopCount || s.holdCount || 0) + '件', formatYen(s.monthlyStopAmount || s.holdTotal || 0)]
    ];
    wrap.innerHTML = cards.map(function(card) {
      return '<div class="summary-card"><div class="label">' + card[0] +
        '</div><div class="value">' + card[1] + '</div><div class="sub">' + card[2] + '</div></div>';
    }).join('');
  }

  function renderTable(wrapId, columns, rows, rowClassFn, rowIdKey) {
    var wrap = $(wrapId);
    if (!rows.length) {
      wrap.innerHTML = '<div class="panel">データがありません。</div>';
      return;
    }
    var html = ['<table class="data-table"><thead><tr>'];
    columns.forEach(function(col) {
      html.push('<th>' + col.label + '</th>');
    });
    html.push('</tr></thead><tbody>');
    rows.forEach(function(row) {
      var cls = rowClassFn ? rowClassFn(row) : '';
      var rowId = rowIdKey ? row[rowIdKey] : '';
      var rowAttr = rowId ? ' data-match-id="' + rowId + '"' : '';
      html.push('<tr class="' + cls + '"' + rowAttr + '>');
      columns.forEach(function(col) {
        var value = typeof col.render === 'function' ? col.render(row) : (row[col.key] || '');
        html.push('<td>' + value + '</td>');
      });
      html.push('</tr>');
    });
    html.push('</tbody></table>');
    wrap.innerHTML = html.join('');
  }

  function escapeHtml_(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function toHiraganaForSearchClient_(value) {
    return normalizeDisplayText_(value).replace(/[ァ-ヶ]/g, function(ch) {
      return String.fromCharCode(ch.charCodeAt(0) - 0x60);
    }).toLowerCase();
  }

  function normalizeIdForMatchClient_(value) {
    return normalizeDisplayText_(value)
      .replace(/[０-９]/g, function(ch) {
        return String.fromCharCode(ch.charCodeAt(0) - 0xFEE0);
      })
      .replace(/^0+/, '');
  }

  function matchBillingRowLocal_(row, query) {
    var q = normalizeDisplayText_(query);
    if (!q) return false;
    var searchKey = toHiraganaForSearchClient_(q);
    var qId = normalizeIdForMatchClient_(q);
    if (qId && (String(row.matchId || '').indexOf(qId) >= 0
      || String(row.rawId || '').indexOf(q) >= 0)) return true;
    var kanaKey = toHiraganaForSearchClient_(row.kana || '');
    var nameKey = toHiraganaForSearchClient_(row.name || '');
    if (searchKey && (kanaKey.indexOf(searchKey) >= 0 || nameKey.indexOf(searchKey) >= 0)) return true;
    if (row.name && row.name.indexOf(q) >= 0) return true;
    return false;
  }

  function formatAmountInputDisplay_(amount) {
    if (amount === '' || amount == null) return '';
    var num = Number(amount);
    if (!isFinite(num) || num === 0) return '';
    return String(num);
  }

  function parseAmountInput_(value) {
    var text = String(value == null ? '' : value).replace(/,/g, '').trim();
    if (!text) return 0;
    var num = Number(text);
    return isFinite(num) ? Math.max(0, Math.round(num)) : 0;
  }

  function compareByKanaNameClient_(a, b) {
    var keyA = a.kana || a.name || '';
    var keyB = b.kana || b.name || '';
    return keyA.localeCompare(keyB, 'ja');
  }

  function hideSearchCandidates(areaId) {
    var area = $(areaId);
    if (!area) return;
    area.hidden = true;
    area.innerHTML = '';
  }

  function renderSearchCandidateCards(areaId, users, onSelect, emptyMessage) {
    var area = $(areaId);
    if (!area) return;
    area.hidden = false;
    if (!users.length) {
      area.innerHTML = '<div class="candidate-empty">' + escapeHtml_(emptyMessage || '該当する利用者はいません。') + '</div>';
      return;
    }
    area.innerHTML = users.map(function(user) {
      return '<button type="button" class="candidate-card candidate-card-clickable" data-match-id="' + escapeHtml_(user.matchId) + '">' +
        '<div class="candidate-card-body">' +
        '<div class="candidate-name">' + escapeHtml_(user.name || '') + '</div>' +
        '<div class="candidate-meta">' + escapeHtml_(user.kana || '') + ' / ID:' + escapeHtml_(user.rawId || user.matchId || '') + '</div>' +
        '</div></button>';
    }).join('');
    area.querySelectorAll('.candidate-card').forEach(function(button) {
      button.addEventListener('click', function() {
        var matchId = button.getAttribute('data-match-id');
        var user = users.find(function(item) { return item.matchId === matchId; });
        if (user) onSelect(user);
      });
    });
  }

  function buildBillingSearchCandidates(localRows, masterUsers) {
    var existing = getAllBillingMatchIds();
    var seen = {};
    var result = [];

    (localRows || []).forEach(function(row) {
      if (seen[row.matchId]) return;
      seen[row.matchId] = true;
      result.push({
        matchId: row.matchId,
        name: row.name,
        kana: row.kana || '',
        rawId: row.rawId || row.matchId,
        inList: true,
        isPastOnly: !!row.isPastOnly
      });
    });

    (masterUsers || []).forEach(function(user) {
      if (seen[user.matchId]) return;
      seen[user.matchId] = true;
      if (existing[user.matchId]) {
        var found = findDraftRow_(user.matchId);
        result.push({
          matchId: user.matchId,
          name: found ? found.row.name : user.name,
          kana: (found && found.row.kana) || user.kana || '',
          rawId: user.rawId || user.matchId,
          inList: true,
          isPastOnly: found ? found.isPastOnly : false
        });
      } else {
        result.push({
          matchId: user.matchId,
          name: user.name,
          kana: user.kana || '',
          rawId: user.rawId || user.matchId,
          inList: false,
          user: user
        });
      }
    });

    return result.sort(function(a, b) {
      return compareByKanaNameClient_(a, b);
    });
  }

  function renderBillingSearchCandidates(candidates) {
    var area = $('billing-name-search-candidates');
    if (!area) return;
    area.hidden = false;
    if (!candidates.length) {
      area.innerHTML = '<div class="candidate-empty">該当する利用者はいません。</div>';
      return;
    }
    area.innerHTML = candidates.map(function(candidate) {
      var actionHtml = candidate.inList
        ? '<span class="candidate-badge">一覧へ</span>'
        : '<button type="button" class="candidate-add-button" data-match-id="' + escapeHtml_(candidate.matchId) + '">追加</button>';
      var cls = 'candidate-card candidate-card-billing' + (candidate.inList ? ' candidate-card-clickable' : '');
      return '<div class="' + cls + '" data-match-id="' + escapeHtml_(candidate.matchId) + '" data-in-list="' + (candidate.inList ? '1' : '0') + '">' +
        '<div class="candidate-card-body">' +
        '<div class="candidate-name">' + escapeHtml_(candidate.name) + '</div>' +
        '<div class="candidate-meta">' + escapeHtml_(candidate.kana) + ' / ID:' + escapeHtml_(candidate.rawId) + '</div>' +
        '</div>' + actionHtml + '</div>';
    }).join('');

    area.querySelectorAll('.candidate-card-billing[data-in-list="1"]').forEach(function(card) {
      card.addEventListener('click', function() {
        var matchId = card.getAttribute('data-match-id');
        var candidate = candidates.find(function(item) { return item.matchId === matchId; });
        hideSearchCandidates('billing-name-search-candidates');
        var input = $('billing-name-search-input');
        if (input && candidate) input.value = candidate.name || '';
        scrollToBillingRow(matchId, candidate && candidate.isPastOnly);
      });
    });

    area.querySelectorAll('.candidate-add-button').forEach(function(button) {
      button.addEventListener('click', function(event) {
        event.stopPropagation();
        var matchId = button.getAttribute('data-match-id');
        var candidate = candidates.find(function(item) { return item.matchId === matchId; });
        if (candidate && candidate.user) addPastOnlyUserFromSearch(candidate.user);
      });
    });
  }

  function renderReconcileSummaryFromData(s) {
    var wrap = $('reconcile-summary-table-wrap');
    if (!wrap) return;
    if (!s) {
      wrap.innerHTML = '';
      return;
    }
    var countJudge = s.countMatch
      ? '<span class="reconcile-summary-ok">OK</span>'
      : '<span class="reconcile-summary-ng">不一致</span>';
    var amountJudge = s.amountMatch
      ? '<span class="reconcile-summary-ok">OK</span>'
      : '<span class="reconcile-summary-ng">不一致</span>';
    wrap.innerHTML = [
      '<table class="reconcile-summary-table"><thead><tr>',
      '<th></th><th>請求整理</th><th>e集ちゃん</th><th>一致判定</th><th>差</th>',
      '</tr></thead><tbody>',
      '<tr><td class="label-cell">件数</td>',
      '<td>' + s.billingCount + '件</td>',
      '<td>' + s.eshuCount + '件</td>',
      '<td>' + countJudge + '</td>',
      '<td>' + (s.countMatch ? '0件' : (s.countDiff > 0 ? '+' : '') + s.countDiff + '件') + '</td>',
      '</tr>',
      '<tr><td class="label-cell">金額</td>',
      '<td>' + formatYen(s.billingTotal) + '</td>',
      '<td>' + formatYen(s.eshuTotal) + '</td>',
      '<td>' + amountJudge + '</td>',
      '<td>' + (s.amountMatch ? '0円' : formatYen(s.amountDiff)) + '</td>',
      '</tr></tbody></table>'
    ].join('');
  }

  function renderReconcileSummary() {
    if (!state.targetMonth) return;
    runServerSilent('getReconcileComparisonSummary', state.targetMonth).then(function(s) {
      renderReconcileSummaryFromData(s);
    }).catch(function() {
      renderReconcileSummaryFromData(null);
    });
  }

  function reconcileJudgmentRank_(judgment) {
    if (judgment === '金額不一致') return 1;
    if (judgment === '未入力') return 2;
    if (judgment === '氏名注意') return 3;
    if (judgment === 'OK') return 4;
    return 5;
  }

  function sortReconcileRows_(rows, sortBy) {
    var list = (rows || []).slice();
    list.sort(function(a, b) {
      if (sortBy === 'judgment') {
        var rankDiff = reconcileJudgmentRank_(a['判定']) - reconcileJudgmentRank_(b['判定']);
        if (rankDiff !== 0) return rankDiff;
      }
      if (sortBy === 'id') {
        return compareMatchIdsClient_(a['照合用ID'], b['照合用ID']);
      }
      var nameA = a['フリガナ'] || a['ほのぼの氏名'] || a['e集ちゃん氏名'] || '';
      var nameB = b['フリガナ'] || b['ほのぼの氏名'] || b['e集ちゃん氏名'] || '';
      return nameA.localeCompare(nameB, 'ja');
    });
    return list;
  }

  function compareMatchIdsClient_(left, right) {
    var aText = normalizeDisplayText_(left);
    var bText = normalizeDisplayText_(right);
    if (/^\d+$/.test(aText) && /^\d+$/.test(bText)) {
      var aNum = Number(aText);
      var bNum = Number(bText);
      if (aNum !== bNum) return aNum - bNum;
      return aText.length - bText.length;
    }
    return aText.localeCompare(bText);
  }

  function getReconcileSortBy() {
    var select = $('reconcile-sort');
    return select ? select.value : 'name';
  }

  function reconcileRowClass(row) {
    var judgment = row['判定'];
    if (judgment === 'OK') return '';
    if (judgment === '氏名注意') return 'row-reconcile-warn';
    if (judgment === '未入力') return 'row-reconcile-not-input';
    return 'row-reconcile-mismatch';
  }

  function renderReconcileTable(rows, wrapId) {
    var targetWrap = wrapId || getActiveReconcileWrapId();
    var sorted = sortReconcileRows_(rows, getReconcileSortBy());
    renderTable(targetWrap, [
      { key: '照合用ID', label: 'ID' },
      { key: 'ほのぼの氏名', label: 'ほのぼの氏名' },
      { key: 'e集ちゃん氏名', label: 'e集ちゃん氏名' },
      { key: '請求状態', label: '請求状態' },
      { key: '最終請求額', label: '最終請求額', render: function(r) { return formatReconcileAmount(r['最終請求額']); } },
      { key: 'e集ちゃん請求金額', label: 'e集ちゃん金額', render: function(r) { return formatReconcileAmount(r['e集ちゃん請求金額']); } },
      { key: '差額', label: '差額', render: function(r) { return formatReconcileAmount(r['差額']); } },
      { key: '判定', label: '判定', render: function(r) {
        var cls = r['判定'] === 'OK' ? 'judgment-ok' : (r['判定'] === '氏名注意' ? 'judgment-warn' : 'judgment-error');
        return '<span class="' + cls + '">' + r['判定'] + '</span>';
      } },
      { key: 'actions', label: '操作', render: function(r) {
        if (r['判定'] !== '氏名注意' || !isEditable()) return '';
        return '<button type="button" data-confirm-name="' + r['照合用ID'] + '">氏名確認済み</button>';
      } }
    ], sorted, reconcileRowClass, '照合用ID');
    bindReconcileActions(targetWrap);
  }

  function bindReconcileActions(wrapId) {
    var wrap = $(wrapId || getActiveReconcileWrapId());
    if (!wrap) return;
    wrap.querySelectorAll('[data-confirm-name]').forEach(function(button) {
      button.addEventListener('click', function() {
        var matchId = button.getAttribute('data-confirm-name');
        runServer('confirmNameWarning', matchId, '', state.targetMonth).then(function() {
          return runServerSilent('getReconcileResults', state.targetMonth).then(function(rows) {
            state.reconcile = rows || [];
            renderReconcileTable(state.reconcile);
            renderReconcileSummary();
            return reloadMonthSnapshot();
          });
        }).catch(handleImportError);
      });
    });
  }

  function cloneHonobonoDraftData(data) {
    return JSON.parse(JSON.stringify(data || []));
  }

  function resetHonobonoDraftFromServer(result) {
    var pastOnlyRows = cloneHonobonoDraftData((result && result.pastOnlyRows) || []).map(function(row) {
      return {
        matchId: row.matchId,
        rawId: row.rawId,
        name: row.name,
        kana: row.kana || '',
        status: '過去分のみ',
        isPastOnly: true,
        pastOnlyAmount: row.finalAmount || 0,
        honobonoAmount: 0,
        finalAmount: row.finalAmount || 0,
        memo: row.memo || ''
      };
    });
    state.honobonoDraft = {
      rows: cloneHonobonoDraftData((result && result.rows) || []),
      pastOnlyRows: pastOnlyRows,
      removedPastOnly: [],
      serverPastOnlyIds: pastOnlyRows.map(function(row) { return row.matchId; }),
      dirtyMatchIds: {},
      dirtyPastOnlyIds: {},
      dirtyMemoIds: {},
      dirty: false
    };
    updateHonobonoDraftUi();
  }

  function updateHonobonoDraftUi() {
    var dirty = state.honobonoDraft.dirty;
    var saveBtn = $('honobono-save-button');
    var statusEl = $('honobono-draft-status');
    if (saveBtn) saveBtn.disabled = !dirty || !isEditable();
    if (statusEl) {
      statusEl.textContent = dirty ? '未保存の変更があります' : '保存済み';
      statusEl.className = 'draft-status' + (dirty ? '' : ' saved');
    }
  }

  function markHonobonoDraftDirty(matchId, isPastOnly) {
    state.honobonoDraft.dirty = true;
    if (isPastOnly) state.honobonoDraft.dirtyPastOnlyIds[matchId] = true;
    else state.honobonoDraft.dirtyMatchIds[matchId] = true;
    updateHonobonoDraftUi();
  }

  function markHonobonoDraftDirtyForMemo(matchId) {
    state.honobonoDraft.dirty = true;
    state.honobonoDraft.dirtyMemoIds = state.honobonoDraft.dirtyMemoIds || {};
    state.honobonoDraft.dirtyMemoIds[matchId] = true;
    updateHonobonoDraftUi();
  }

  function renderBillingMemoCell_(row, editable) {
    var html = ['<td class="memo-cell">'];
    if (editable && isEditable()) {
      html.push('<input class="billing-memo-input" type="text" placeholder="メモ" data-memo-match-id="' + row.matchId + '" value="' + escapeHtml_(row.memo || '') + '">');
    } else {
      html.push('<span class="billing-memo-text">' + escapeHtml_(row.memo || '') + '</span>');
    }
    html.push('</td>');
    return html.join('');
  }

  function getHonobonoSortBy() {
    var select = $('honobono-sort');
    return select ? select.value : 'name';
  }

  function sortHonobonoRowsClient_(rows, sortBy) {
    var list = (rows || []).slice();
    list.sort(function(a, b) {
      if (sortBy === 'id') return compareMatchIdsClient_(a.rawId || a.matchId, b.rawId || b.matchId);
      return compareByKanaNameClient_(a, b);
    });
    return list;
  }

  function getSortedHonobonoDisplayRows() {
    return sortHonobonoRowsClient_(getHonobonoDisplayRows(), getHonobonoSortBy());
  }

  function scrollToBillingRow(matchId, focusAmount) {
    var wrap = $('honobono-billing-table-wrap');
    if (!wrap) return;
    var row = wrap.querySelector('tr[data-match-id="' + matchId + '"]');
    if (!row) return;
    row.classList.add('row-search-highlight');
    row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    window.setTimeout(function() {
      row.classList.remove('row-search-highlight');
    }, 3000);
    if (focusAmount) {
      var input = row.querySelector('.past-only-amount');
      if (input) input.focus();
    }
  }

  function getAllBillingMatchIds() {
    var ids = {};
    (state.honobonoDraft.rows || []).forEach(function(row) {
      ids[row.matchId] = true;
    });
    (state.honobonoDraft.pastOnlyRows || []).forEach(function(row) {
      ids[row.matchId] = true;
    });
    return ids;
  }

  function computeDraftFinalAmount(row) {
    if (row.isPastOnly || row.status === '過去分のみ') {
      return Number(row.pastOnlyAmount) || 0;
    }
    var honobono = Number(row.honobonoAmount) || 0;
    if (row.status === '現金支払い' || row.status === '当月停止') return 0;
    if (row.status === '合算') {
      var add = (row.additionalItems || []).reduce(function(sum, item) {
        return sum + (Number(item.amount) || 0);
      }, 0);
      return honobono + add;
    }
    return honobono;
  }

  function honobonoRowClass(row) {
    if (row.isPastOnly || row.status === '過去分のみ') return 'row-past-only';
    if (row.status === '現金支払い') return 'row-billing-cash';
    if (row.status === '当月停止') return 'row-billing-hold';
    if (row.status === '合算') return 'row-billing-combined';
    return '';
  }

  function getHonobonoDisplayRows() {
    return (state.honobonoDraft.rows || []).concat(state.honobonoDraft.pastOnlyRows || []);
  }

  function renderHonobonoBillingTable(force) {
    if (!state.targetMonth) return;
    if (!force && state.honobonoDraft.dirty) {
      renderHonobonoBillingRows('honobono-billing-table-wrap', getSortedHonobonoDisplayRows(), true);
      return;
    }
    if (!force && state.loadedScreens.honobono === state.targetMonth) return;
    runServerSilent('getHonobonoBillingList', state.targetMonth).then(function(result) {
      state.loadedScreens.honobono = state.targetMonth;
      state.honobonoBilling = result || null;
      resetHonobonoDraftFromServer(result);
      if (result && result.summary) {
        state.dashboard = { summary: result.summary };
        renderSummary();
      }
      renderHonobonoBillingRows('honobono-billing-table-wrap', getSortedHonobonoDisplayRows(), true);
    }).catch(function() {});
  }

  function renderHonobonoBillingRows(wrapId, rows, editable) {
    var wrap = $(wrapId);
    if (!rows.length) {
      wrap.innerHTML = '<div class="panel">データがありません。ほのぼのCSVを取込するか、過去分のみを追加してください。</div>';
      return;
    }
    var statusOptions = ['通常', '合算', '当月停止', '現金支払い'];
    var html = ['<table class="data-table"><thead><tr>',
      '<th>顧客番号</th><th>氏名</th><th>ほのぼの請求額</th><th>請求区分</th><th>追加金額</th><th>最終請求額</th><th>メモ</th><th></th>',
      '</tr></thead><tbody>'];
    rows.forEach(function(row) {
      var rowCls = honobonoRowClass(row);
      html.push('<tr class="' + rowCls + '" data-match-id="' + row.matchId + '">');
      html.push('<td>' + (row.rawId || row.matchId) + '</td>');
      html.push('<td>' + row.name + '</td>');
      if (row.isPastOnly) {
        html.push('<td>—</td>');
        html.push('<td>過去分のみ</td><td>');
        if (editable && isEditable()) {
          html.push('<input class="past-only-amount amount-text-input" type="text" inputmode="numeric" data-past-only-match-id="' + row.matchId + '" value="' + escapeHtml_(formatAmountInputDisplay_(row.pastOnlyAmount)) + '">');
        } else {
          html.push(formatYen(row.pastOnlyAmount || 0));
        }
        html.push('</td><td data-final-amount-cell>' + formatYen(computeDraftFinalAmount(row)) + '</td>');
        html.push(renderBillingMemoCell_(row, editable));
        html.push('<td>');
        if (editable && isEditable()) {
          html.push('<button type="button" class="past-only-remove" data-past-only-match-id="' + row.matchId + '">削除</button>');
        }
        html.push('</td></tr>');
        return;
      }
      html.push('<td>' + formatYen(row.honobonoAmount) + '</td>');
      html.push('<td>');
      if (editable && isEditable()) {
        html.push('<select class="status-select" data-status-match-id="' + row.matchId + '">');
        statusOptions.forEach(function(option) {
          var selected = row.status === option ? ' selected' : '';
          html.push('<option value="' + option + '"' + selected + '>' + option + '</option>');
        });
        html.push('</select>');
      } else {
        html.push(row.status);
      }
      html.push('</td><td>');
      if (row.status === '合算') {
        var items = (row.additionalItems && row.additionalItems.length)
          ? row.additionalItems
          : [{ id: '', amount: '' }];
        if (editable && isEditable()) {
          html.push('<div class="additional-list" data-additional-list="' + row.matchId + '">');
          items.forEach(function(item) {
            html.push('<span class="additional-row">');
            html.push('<input class="additional-input amount-text-input" type="text" inputmode="numeric" data-additional-match-id="' + row.matchId + '" value="' + escapeHtml_(formatAmountInputDisplay_(item.amount)) + '">');
            html.push('<button type="button" class="additional-remove" data-additional-match-id="' + row.matchId + '">×</button>');
            html.push('</span>');
          });
          html.push('<button type="button" class="additional-add" data-additional-match-id="' + row.matchId + '">+</button>');
          html.push('</div>');
        } else {
          html.push(items.map(function(item) { return formatYen(item.amount); }).join(' + '));
        }
      }
      html.push('</td><td data-final-amount-cell>' + formatYen(computeDraftFinalAmount(row)) + '</td>');
      html.push(renderBillingMemoCell_(row, editable));
      html.push('<td></td></tr>');
    });
    html.push('</tbody></table>');
    wrap.innerHTML = html.join('');
    if (editable && isEditable()) bindHonobonoBillingEditors(wrapId);
  }

  function findDraftRow_(matchId) {
    var row = (state.honobonoDraft.rows || []).find(function(item) {
      return item.matchId === matchId;
    });
    if (row) return { row: row, isPastOnly: false };
    row = (state.honobonoDraft.pastOnlyRows || []).find(function(item) {
      return item.matchId === matchId;
    });
    if (row) return { row: row, isPastOnly: true };
    return null;
  }

  function applyDraftRowUpdate_(matchId, updater) {
    var isPastOnly = false;
    var updated = false;
    state.honobonoDraft.rows = (state.honobonoDraft.rows || []).map(function(row) {
      if (row.matchId !== matchId) return row;
      updated = true;
      return updater(row);
    });
    if (!updated) {
      state.honobonoDraft.pastOnlyRows = (state.honobonoDraft.pastOnlyRows || []).map(function(row) {
        if (row.matchId !== matchId) return row;
        isPastOnly = true;
        return updater(row);
      });
    }
    markHonobonoDraftDirty(matchId, isPastOnly);
    return findDraftRow_(matchId);
  }

  function refreshDraftRowFinalAmount_(matchId) {
    var found = findDraftRow_(matchId);
    if (!found) return;
    var wrap = $('honobono-billing-table-wrap');
    if (!wrap) return;
    var rowEl = wrap.querySelector('tr[data-match-id="' + matchId + '"]');
    if (!rowEl) return;
    var cell = rowEl.querySelector('[data-final-amount-cell]');
    if (cell) cell.textContent = formatYen(computeDraftFinalAmount(found.row));
  }

  function updateDraftRowSilent(matchId, updater) {
    applyDraftRowUpdate_(matchId, updater);
    refreshDraftRowFinalAmount_(matchId);
  }

  function updateDraftRow(matchId, updater) {
    applyDraftRowUpdate_(matchId, updater);
    renderHonobonoBillingRows('honobono-billing-table-wrap', getSortedHonobonoDisplayRows(), true);
  }

  function collectAdditionalAmounts(matchId) {
    var list = document.querySelector('[data-additional-list="' + matchId + '"]');
    if (!list) return [];
    return Array.prototype.map.call(list.querySelectorAll('.additional-input'), function(input) {
      return input.value;
    });
  }

  function bindHonobonoBillingEditors(wrapId) {
    var wrap = $(wrapId);
    if (!wrap) return;
    wrap.querySelectorAll('.status-select').forEach(function(select) {
      select.addEventListener('change', function() {
        var matchId = select.getAttribute('data-status-match-id');
        var status = select.value;
        updateDraftRow(matchId, function(row) {
          var next = Object.assign({}, row, { status: status });
          if (status === '合算' && (!next.additionalItems || !next.additionalItems.length)) {
            next.additionalItems = [{ id: '', amount: '' }];
          }
          if (status !== '合算') next.additionalItems = [];
          return next;
        });
      });
    });
    wrap.querySelectorAll('.additional-input').forEach(function(input) {
      input.addEventListener('input', function() {
        var matchId = input.getAttribute('data-additional-match-id');
        var amounts = collectAdditionalAmounts(matchId);
        updateDraftRowSilent(matchId, function(row) {
          var items = amounts.map(function(amount) {
            return { id: '', amount: parseAmountInput_(amount) };
          });
          return Object.assign({}, row, { status: '合算', additionalItems: items });
        });
      });
    });
    wrap.querySelectorAll('.additional-add').forEach(function(button) {
      button.addEventListener('click', function() {
        var matchId = button.getAttribute('data-additional-match-id');
        var list = wrap.querySelector('[data-additional-list="' + matchId + '"]');
        if (!list) return;
        var rowHtml = '<span class="additional-row">' +
          '<input class="additional-input amount-text-input" type="text" inputmode="numeric" data-additional-match-id="' + matchId + '" value="">' +
          '<button type="button" class="additional-remove" data-additional-match-id="' + matchId + '">×</button>' +
          '</span>';
        var temp = document.createElement('div');
        temp.innerHTML = rowHtml;
        var newRow = temp.firstChild;
        list.insertBefore(newRow, button);
        var newInput = newRow.querySelector('.additional-input');
        var removeBtn = newRow.querySelector('.additional-remove');
        newInput.addEventListener('input', function() {
          var amounts = collectAdditionalAmounts(matchId);
          updateDraftRowSilent(matchId, function(row) {
            var items = amounts.map(function(amount) {
              return { id: '', amount: parseAmountInput_(amount) };
            });
            return Object.assign({}, row, { status: '合算', additionalItems: items });
          });
        });
        removeBtn.addEventListener('click', function() {
          if (newRow.parentNode) newRow.parentNode.removeChild(newRow);
          var amounts = collectAdditionalAmounts(matchId);
          updateDraftRowSilent(matchId, function(row) {
            var items = amounts.map(function(amount) {
              return { id: '', amount: parseAmountInput_(amount) };
            });
            return Object.assign({}, row, { status: '合算', additionalItems: items });
          });
        });
        newInput.focus();
        updateDraftRowSilent(matchId, function(row) {
          var items = (row.additionalItems || []).slice();
          items.push({ id: '', amount: '' });
          return Object.assign({}, row, { status: '合算', additionalItems: items });
        });
      });
    });
    wrap.querySelectorAll('.additional-remove').forEach(function(button) {
      button.addEventListener('click', function() {
        var matchId = button.getAttribute('data-additional-match-id');
        var rowEl = button.closest('.additional-row');
        if (rowEl && rowEl.parentNode) rowEl.parentNode.removeChild(rowEl);
        var amounts = collectAdditionalAmounts(matchId);
        updateDraftRowSilent(matchId, function(row) {
          var items = amounts.map(function(amount) {
            return { id: '', amount: parseAmountInput_(amount) };
          });
          return Object.assign({}, row, { status: '合算', additionalItems: items });
        });
      });
    });
    wrap.querySelectorAll('.past-only-amount').forEach(function(input) {
      input.addEventListener('input', function() {
        var matchId = input.getAttribute('data-past-only-match-id');
        var amount = parseAmountInput_(input.value);
        updateDraftRowSilent(matchId, function(row) {
          return Object.assign({}, row, { pastOnlyAmount: amount, finalAmount: amount });
        });
      });
    });
    wrap.querySelectorAll('.past-only-remove').forEach(function(button) {
      button.addEventListener('click', function() {
        var matchId = button.getAttribute('data-past-only-match-id');
        if (state.honobonoDraft.serverPastOnlyIds.indexOf(matchId) >= 0) {
          state.honobonoDraft.removedPastOnly.push(matchId);
        }
        state.honobonoDraft.pastOnlyRows = (state.honobonoDraft.pastOnlyRows || []).filter(function(row) {
          return row.matchId !== matchId;
        });
        markHonobonoDraftDirty(matchId, true);
        renderHonobonoBillingRows(wrapId, getSortedHonobonoDisplayRows(), true);
      });
    });
    wrap.querySelectorAll('.billing-memo-input').forEach(function(input) {
      input.addEventListener('input', function() {
        var matchId = input.getAttribute('data-memo-match-id');
        var memo = input.value;
        var updated = false;
        state.honobonoDraft.rows = (state.honobonoDraft.rows || []).map(function(row) {
          if (row.matchId !== matchId) return row;
          updated = true;
          return Object.assign({}, row, { memo: memo });
        });
        if (!updated) {
          state.honobonoDraft.pastOnlyRows = (state.honobonoDraft.pastOnlyRows || []).map(function(row) {
            if (row.matchId !== matchId) return row;
            return Object.assign({}, row, { memo: memo });
          });
        }
        markHonobonoDraftDirtyForMemo(matchId);
      });
    });
  }

  function saveHonobonoBillingDraft() {
    if (!state.honobonoDraft.dirty) return Promise.resolve();
    var dirtyMatchIds = state.honobonoDraft.dirtyMatchIds || {};
    var dirtyPastOnlyIds = state.honobonoDraft.dirtyPastOnlyIds || {};
    var dirtyMemoIds = state.honobonoDraft.dirtyMemoIds || {};
    var payload = {
      changedRows: (state.honobonoDraft.rows || []).filter(function(row) {
        return dirtyMatchIds[row.matchId];
      }).map(function(row) {
        return {
          matchId: row.matchId,
          status: row.status,
          additionalAmounts: row.status === '合算'
            ? (row.additionalItems || []).map(function(item) { return item.amount; })
            : []
        };
      }),
      pastOnlyRows: (state.honobonoDraft.pastOnlyRows || []).filter(function(row) {
        return dirtyPastOnlyIds[row.matchId];
      }).map(function(row) {
        return {
          matchId: row.matchId,
          name: row.name,
          amount: row.pastOnlyAmount || 0
        };
      }),
      removedPastOnly: state.honobonoDraft.removedPastOnly || [],
      memoRows: getHonobonoDisplayRows().filter(function(row) {
        return dirtyMemoIds[row.matchId];
      }).map(function(row) {
        return {
          matchId: row.matchId,
          name: row.name,
          memo: row.memo || ''
        };
      })
    };
    return runServer('saveHonobonoBillingBatch', state.targetMonth, payload).then(function(result) {
      if (result && result.month) {
        state.month = result.month;
        renderFromState();
      }
      if (result && result.honobonoBilling) {
        state.loadedScreens.honobono = state.targetMonth;
        state.honobonoBilling = result.honobonoBilling;
        resetHonobonoDraftFromServer(result.honobonoBilling);
        state.honobonoDraft.dirty = false;
        state.honobonoDraft.dirtyMatchIds = {};
        state.honobonoDraft.dirtyPastOnlyIds = {};
        state.honobonoDraft.dirtyMemoIds = {};
        state.honobonoDraft.removedPastOnly = [];
        if (result.honobonoBilling.summary) {
          state.dashboard = Object.assign({}, state.dashboard || {}, { summary: result.honobonoBilling.summary });
          renderSummary();
        }
        renderHonobonoBillingRows('honobono-billing-table-wrap', getSortedHonobonoDisplayRows(), true);
        return;
      }
      state.loadedScreens.honobono = '';
      state.honobonoDraft.dirty = false;
      state.honobonoDraft.dirtyMatchIds = {};
      state.honobonoDraft.dirtyPastOnlyIds = {};
      state.honobonoDraft.dirtyMemoIds = {};
      renderHonobonoBillingTable(true);
    }).then(function() {
      showMessage('請求整理を保存しました。', 'success');
    }).catch(handleImportError);
  }

  function addPastOnlyUserFromSearch(user) {
    state.honobonoDraft.pastOnlyRows.push({
      matchId: user.matchId,
      rawId: user.rawId,
      name: user.name,
      kana: user.kana || '',
      status: '過去分のみ',
      isPastOnly: true,
      pastOnlyAmount: 0,
      honobonoAmount: 0,
      finalAmount: 0
    });
    markHonobonoDraftDirty(user.matchId, true);
    renderHonobonoBillingRows('honobono-billing-table-wrap', getSortedHonobonoDisplayRows(), true);
    hideSearchCandidates('billing-name-search-candidates');
    var input = $('billing-name-search-input');
    if (input) input.value = user.name || '';
    scrollToBillingRow(user.matchId, true);
  }

  function handleBillingNameSearchInput(value) {
    var keyword = String(value || '').trim();
    state.billingSearchKeyword = keyword;

    if (state.billingSearchTimer) {
      clearTimeout(state.billingSearchTimer);
      state.billingSearchTimer = null;
    }

    if (!keyword) {
      hideSearchCandidates('billing-name-search-candidates');
      return;
    }

    state.billingSearchTimer = setTimeout(function() {
      var localRows = getSortedHonobonoDisplayRows().filter(function(row) {
        return matchBillingRowLocal_(row, keyword);
      });
      var area = $('billing-name-search-candidates');
      if (area) {
        area.hidden = false;
        area.innerHTML = '<div class="candidate-loading">検索中…</div>';
      }

      runServerSilent('searchMasterUsers', keyword, $('billing-include-ended').checked).then(function(users) {
        if (normalizeDisplayText_(state.billingSearchKeyword) !== normalizeDisplayText_(keyword)) return;
        renderBillingSearchCandidates(buildBillingSearchCandidates(localRows, users || []));
      }).catch(function(error) {
        if (localRows.length) {
          renderBillingSearchCandidates(buildBillingSearchCandidates(localRows, []));
          return;
        }
        if (area) {
          area.innerHTML = '<div class="candidate-empty">' + escapeHtml_(error.message || '検索に失敗しました。') + '</div>';
        }
      });
    }, 250);
  }

  function fetchCashSearchCandidates(keyword) {
    var area = $('cash-search-candidates');
    if (!area) return;
    area.hidden = false;
    area.innerHTML = '<div class="candidate-loading">検索中…</div>';

    runServerSilent('searchActiveMasterUsers', keyword).then(function(users) {
      if (normalizeDisplayText_(state.cashSearchKeyword) !== normalizeDisplayText_(keyword)) return;
      var registered = {};
      (state.cashMaster || []).forEach(function(row) {
        registered[normalizeIdForMatchClient_(row['照合用ID'])] = true;
      });
      var filtered = (users || []).filter(function(user) {
        return !registered[user.matchId];
      });
      renderSearchCandidateCards('cash-search-candidates', filtered, function(user) {
        runServer('registerCashMaster', user.matchId, user.name).then(function() {
          return loadSecondaryMonthData();
        }).then(function() {
          hideSearchCandidates('cash-search-candidates');
          var input = $('cash-search-input');
          if (input) input.value = user.name || '';
          showMessage(user.name + ' を現金支払いマスタに登録しました。', 'success');
        }).catch(handleImportError);
      });
    }).catch(function(error) {
      if (area) {
        area.hidden = false;
        area.innerHTML = '<div class="candidate-empty">' + escapeHtml_(error.message || '検索に失敗しました。') + '</div>';
      }
    });
  }

  function handleCashSearchInput(value) {
    var keyword = String(value || '').trim();
    state.cashSearchKeyword = keyword;

    if (state.cashSearchTimer) {
      clearTimeout(state.cashSearchTimer);
      state.cashSearchTimer = null;
    }

    if (!keyword) {
      hideSearchCandidates('cash-search-candidates');
      return;
    }

    state.cashSearchTimer = setTimeout(function() {
      fetchCashSearchCandidates(keyword);
    }, 250);
  }

  function renderCashMasterTable() {
    renderTable('cash-master-table-wrap', [
      { key: '照合用ID', label: 'ID' },
      { key: '氏名', label: '氏名' },
      { key: '理由・メモ', label: 'メモ' },
      { key: 'actions', label: '操作', render: function(r) {
        if (!isEditable()) return '';
        return '<button type="button" data-unregister-cash="' + r['照合用ID'] + '">解除</button>';
      } }
    ], state.cashMaster.filter(function(row) {
      return row['通常現金'];
    }));
    var wrap = $('cash-master-table-wrap');
    if (!wrap) return;
    wrap.querySelectorAll('[data-unregister-cash]').forEach(function(button) {
      button.addEventListener('click', function() {
        var matchId = button.getAttribute('data-unregister-cash');
        runServer('unregisterCashMaster', matchId).then(function() {
          return loadSecondaryMonthData();
        }).then(function() {
          showMessage('現金支払いマスタから解除しました。', 'success');
        }).catch(handleImportError);
      });
    });
  }

  function renderEshuInputTable(force) {
    if (!state.targetMonth) return;
    if (!force && state.loadedScreens['eshu-input'] === state.targetMonth) return;
    var sortBy = $('eshu-sort').value;
    runServerSilent('getInputTargetList', state.targetMonth, sortBy).then(function(rows) {
      state.loadedScreens['eshu-input'] = state.targetMonth;
      state.eshuInputRows = rows || [];
      state.inputTargets = rows;
      renderEshuInputTableBody();
      bindEshuInputActions();
    }).catch(function() {});
  }

  function renderEshuInputTableBody() {
    var rows = state.eshuInputRows || [];
    var lastCopyId = state.month ? state.month.lastCopyId : '';
    var completeMarkId = state.month ? state.month.completeMarkId : '';
    renderTable('eshu-input-table-wrap', [
      { key: 'mark', label: '目印', render: function(r) {
        if (r.matchId === lastCopyId) return '最新コピー';
        if (r.matchId === completeMarkId) return 'ここまで完了';
        return '';
      } },
      { key: 'rawId', label: '顧客番号' },
      { key: 'name', label: '氏名' },
      { key: 'finalAmount', label: '請求金額', render: function(r) { return formatBillingAmount(r); } },
      { key: 'actions', label: '操作', render: function(r) {
        var html = '';
        if (r.canCopyAmount) {
          html += '<button data-copy-amount="' + r.matchId + '" data-copy-value="' + r.finalAmount + '">金額コピー</button> ';
        }
        html += '<button data-complete-mark="' + r.matchId + '">完了マーク</button>';
        return html;
      } }
    ], rows, function(r) {
      var cls = '';
      if (r.matchId === lastCopyId) cls = 'row-latest-copy';
      else if (r.matchId === completeMarkId) cls = 'row-complete-mark';
      else if (r.isMonthlyStop) cls = 'row-monthly-stop';
      return cls;
    }, 'matchId');
  }

  function mergeWorkState(patch) {
    if (!patch) return;
    state.month = state.month || { targetMonth: state.targetMonth, status: '作業中' };
    if (patch.completeMarkId !== undefined) state.month.completeMarkId = patch.completeMarkId;
    if (patch.lastCopyId !== undefined) {
      state.month.lastCopyId = patch.lastCopyId;
      state.month.lastCopyAt = patch.lastCopyAt || '';
      state.month.lastCopyAmount = patch.lastCopyAmount || '';
    }
  }

  function refreshEshuInputMarkers() {
    renderEshuInputTableBody();
    bindEshuInputActions();
  }

  function bindEshuInputActions() {
    document.querySelectorAll('[data-copy-amount]').forEach(function(button) {
      button.addEventListener('click', function() {
        var matchId = button.getAttribute('data-copy-amount');
        var amount = button.getAttribute('data-copy-value');
        mergeWorkState({
          lastCopyId: matchId,
          lastCopyAt: new Date().toISOString(),
          lastCopyAmount: amount
        });
        updateLastCopyInfo();
        refreshEshuInputMarkers();
        copyText(amount);
        runServerSilent('saveWorkState', state.targetMonth, {
          lastCopy: { matchId: matchId, amount: amount }
        }).then(function(patch) {
          mergeWorkState(patch);
          updateLastCopyInfo();
        }).catch(handleImportError);
        showMessage('金額をコピーしました: ' + amount, 'success');
      });
    });

    document.querySelectorAll('[data-complete-mark]').forEach(function(button) {
      button.addEventListener('click', function() {
        var matchId = button.getAttribute('data-complete-mark');
        var current = state.month ? state.month.completeMarkId : '';
        var nextId = current === matchId ? '' : matchId;
        mergeWorkState({ completeMarkId: nextId });
        refreshEshuInputMarkers();
        runServerSilent('saveWorkState', state.targetMonth, { completeMarkId: nextId })
          .then(function(patch) {
            mergeWorkState(patch);
            refreshEshuInputMarkers();
          })
          .catch(handleImportError);
      });
    });
  }

  function updateLastCopyInfo() {
    var info = '最後にコピー：なし';
    if (state.month && state.month.lastCopyId) {
      info = '最後にコピー：' + state.month.lastCopyId + ' / ' +
        formatYen(state.month.lastCopyAmount) + ' / ' + (state.month.lastCopyAt || '');
    }
    $('last-copy-info').textContent = info;
  }

  function renderHistoryTable() {
    renderTable('history-table-wrap', [
      { key: '日時', label: '日時' },
      { key: '操作者', label: '操作者' },
      { key: '操作種別', label: '操作種別' },
      { key: '対象ID', label: '対象ID' },
      { key: '対象氏名', label: '対象氏名' },
      { key: 'メモ', label: 'メモ' }
    ], state.history);
  }

  function copyText(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(String(text));
    }
    return new Promise(function(resolve, reject) {
      try {
        var textarea = document.createElement('textarea');
        textarea.value = String(text);
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        resolve();
      } catch (error) {
        reject(error);
      }
    });
  }

  function arrayBufferToBase64Payload(buffer) {
    var bytes = new Uint8Array(buffer);
    var chunkSize = 0x8000;
    var binary = '';
    var i;
    for (i = 0; i < bytes.length; i += chunkSize) {
      binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
    }
    return 'B64:' + btoa(binary);
  }

  function readFile(fileInput) {
    return new Promise(function(resolve, reject) {
      var file = fileInput.files && fileInput.files[0];
      if (!file) {
        reject(new Error('ファイルを選択してください。'));
        return;
      }
      var reader = new FileReader();
      reader.onload = function(event) {
        resolve(arrayBufferToBase64Payload(event.target.result));
      };
      reader.onerror = function() { reject(new Error('ファイルの読み込みに失敗しました。')); };
      reader.readAsArrayBuffer(file);
    });
  }

  function loadSecondaryMonthData() {
    var month = state.targetMonth;
    if (!month) return Promise.resolve();
    return Promise.all([
      runServerSilent('getCashMasterList').catch(function() { return []; }),
      runServerSilent('getHistory', month).catch(function() { return []; })
    ]).then(function(parts) {
      state.cashMaster = parts[0] || [];
      state.history = (parts[1] || []).slice(0, 100);
      renderCashMasterTable();
      renderHistoryTable();
    });
  }

  function loadMonthView(month) {
    if (typeof google.script.run.getMonthView === 'function') {
      return runServer('getMonthView', month);
    }
    if (typeof google.script.run.getMonthInfo === 'function') {
      return runServer('getMonthInfo', month).then(function(monthInfo) {
        if (!monthInfo) return null;
        return { month: monthInfo, dashboard: null };
      });
    }
    return Promise.resolve(null);
  }

  function invalidateMonthCache() {
    state.loadedScreens = {};
    state.eshuInputRows = [];
    state.honobonoDraft = {
      rows: [],
      pastOnlyRows: [],
      removedPastOnly: [],
      serverPastOnlyIds: [],
      dirtyMatchIds: {},
      dirtyPastOnlyIds: {},
      dirtyMemoIds: {},
      dirty: false
    };
    updateHonobonoDraftUi();
  }

  function renderFromState() {
    state.editable = !state.month || state.month.status !== '確定済';
    renderSummary();
    updateLastCopyInfo();
    updateEditableUi();
  }

  function applyState(data) {
    if (!data) {
      showMessage('データの取得に失敗しました。もう一度「読み込み」を押してください。', 'error');
      return false;
    }
    if (data.month !== undefined) state.month = data.month || null;
    if (data.dashboard !== undefined) state.dashboard = data.dashboard || null;
    if (data.reconcile !== undefined) state.reconcile = data.reconcile || [];
    renderFromState();
    return true;
  }

  function reloadMonthSnapshot() {
    var month = currentMonthValue();
    if (!month) {
      showMessage('対象月を選択してください。', 'error');
      return Promise.resolve(false);
    }
    state.targetMonth = month;
    invalidateMonthCache();
    return loadMonthView(month).then(function(data) {
      return applyState(data);
    }).catch(function(error) {
      handleImportError(error);
      return false;
    });
  }

  function reloadMonth() {
    var month = currentMonthValue();
    if (!month) {
      showMessage('対象月を選択してください。', 'error');
      return Promise.resolve(false);
    }
    state.targetMonth = month;
    invalidateMonthCache();
    return loadMonthView(month).then(function(data) {
      if (!data) {
        showMessage('データの取得に失敗しました。もう一度「読み込み」を押してください。', 'error');
        return false;
      }
      applyState(data);
      renderHonobonoBillingTable(true);
      return loadSecondaryMonthData().then(function() {
        showMessage('読み込みました。', 'success');
        return true;
      });
    }).catch(function(error) {
      handleImportError(error);
      return false;
    });
  }

  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(function(screen) {
      screen.hidden = screen.id !== 'screen-' + name;
    });
    document.querySelectorAll('.nav-item').forEach(function(button) {
      button.classList.toggle('active', button.getAttribute('data-screen') === name);
    });
    if (name === 'honobono') renderHonobonoBillingTable();
    if (name === 'eshu-input') renderEshuInputTable();
    if (name === 'eshu-import') {
      renderReconcileSummary();
      runServerSilent('getReconcileResults', state.targetMonth).then(function(rows) {
        state.reconcile = rows || [];
        renderReconcileTable(state.reconcile);
      }).catch(function() {
        renderReconcileTable([]);
      });
    }
    if (name === 'cash-master') renderCashMasterTable();
    if (name === 'confirm') renderHistoryTable();
  }

  function initNav() {
    document.querySelectorAll('.nav-item').forEach(function(button) {
      button.addEventListener('click', function() {
        showScreen(button.getAttribute('data-screen'));
      });
    });
  }

  function buildHonobonoPrintHtml_(data) {
    var s = data.summary || {};
    var title = data.printTitle || '請求';
    function yen(v) { return formatYen(v); }
    function tableBody(rowsHtml, colSpan) {
      return rowsHtml || '<tr><td colspan="' + colSpan + '" class="empty-cell">該当なし</td></tr>';
    }
    function listRows(list, amountFn) {
      return (list || []).map(function(row) {
        return '<tr>' +
          '<td class="id-col">' + escapeHtml_(row.rawId || row.matchId) + '</td>' +
          '<td class="name-col">' + escapeHtml_(row.name) + '</td>' +
          '<td class="amount-col"><span class="amount-text">' + escapeHtml_(amountFn(row)) + '</span></td>' +
          '<td class="memo-col"><span class="memo-text">' + escapeHtml_(row.memo || '') + '</span></td>' +
          '</tr>';
      }).join('');
    }
    function listTable(headers, rowsHtml) {
      return '<table><thead><tr>' + headers.map(function(h) {
        return '<th>' + h + '</th>';
      }).join('') + '</tr></thead><tbody>' + tableBody(rowsHtml, headers.length) + '</tbody></table>';
    }
    function printSection(sectionTitle, tableHtml) {
      return '<div class="print-section"><h2>' + sectionTitle + '</h2>' + tableHtml + '</div>';
    }
    var billerRows = listRows(data.billers, function(row) { return row.amountDetail; });
    var pastOnlyRows = listRows(data.pastOnlyList, function(row) { return row.amountDetail; });
    var stopRows = listRows(data.monthlyStopList, function(row) { return yen(row.honobonoAmount || 0); });
    var cashRows = listRows(data.cashList, function(row) { return yen(row.honobonoAmount || 0); });
    var listHeaders = ['顧客番号', '氏名', '請求金額', 'メモ'];
    var billingCount = (data.billers || []).length + (data.pastOnlyList || []).length;
    if (!billingCount && s.billingCount) billingCount = s.billingCount;

    return '<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>' + escapeHtml_(title) + '</title>' +
      '<style>' +
      'body{font-family:"Hiragino Sans","Yu Gothic UI",sans-serif;color:#111827;margin:24px;font-size:12px;}' +
      'h1{font-size:20px;margin:0 0 16px;}' +
      '.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;}' +
      '.summary-box{border:1px solid #d1d5db;border-radius:6px;padding:10px;background:#f9fafb;}' +
      '.summary-box .label{font-size:11px;color:#6b7280;}' +
      '.summary-box .value{font-size:16px;font-weight:700;margin-top:4px;}' +
      '.summary-box .sub{font-size:11px;color:#374151;margin-top:2px;}' +
      '.print-section{margin-bottom:14px;}' +
      '.print-section h2{font-size:14px;margin:0 0 8px;border-left:4px solid #2563eb;padding-left:8px;' +
      'break-after:avoid-page;page-break-after:avoid;}' +
      '.print-section table{break-before:avoid-page;page-break-before:avoid;}' +
      'table{width:100%;border-collapse:collapse;table-layout:fixed;}' +
      'th,td{border:1px solid #d1d5db;padding:6px 8px;text-align:left;vertical-align:top;}' +
      'th{background:#eef2ff;font-size:11px;}' +
      'thead{display:table-header-group;}' +
      'tr{break-inside:avoid-page;page-break-inside:avoid;}' +
      '.id-col{width:10%;}.name-col{width:22%;}.amount-col{width:28%;}.memo-col{width:40%;}' +
      '.amount-text,.memo-text{display:block;white-space:normal;word-break:break-word;overflow-wrap:anywhere;line-height:1.45;}' +
      '.empty-cell{text-align:center;color:#6b7280;}' +
      '@media print{body{margin:12mm;} .no-print{display:none;} .print-section{break-inside:auto;page-break-inside:auto;}}' +
      '</style></head><body>' +
      '<h1>' + escapeHtml_(title) + '</h1>' +
      '<div class="summary-grid print-section">' +
      '<div class="summary-box"><div class="label">請求件数</div><div class="value">' + billingCount + '件</div>' +
      '<div class="sub">合算 ' + (s.combinedCount || 0) + '件 / 過去分のみ ' + (s.pastOnlyCount || 0) + '件</div></div>' +
      '<div class="summary-box"><div class="label">請求合計額</div><div class="value">' + yen(s.totalBillingAmount || 0) + '</div>' +
      '<div class="sub">合算分 ' + yen(s.combinedAmount || 0) + ' / 過去分のみ ' + yen(s.pastOnlyAmount || 0) + '</div></div>' +
      '<div class="summary-box"><div class="label">当月停止 / 現金支払い</div><div class="value">' +
      (s.monthlyStopCount || 0) + '件 / ' + (s.cashCount || 0) + '件</div>' +
      '<div class="sub">現金参考額 ' + yen(s.cashAmount || 0) + '</div></div>' +
      '</div>' +
      printSection('請求者一覧（' + (data.billers || []).length + '件）', listTable(listHeaders, billerRows)) +
      printSection('過去分のみ請求一覧（' + (data.pastOnlyList || []).length + '件）', listTable(listHeaders, pastOnlyRows)) +
      printSection('当月停止一覧（' + (data.monthlyStopList || []).length + '件）', listTable(listHeaders, stopRows)) +
      printSection('現金支払い一覧（' + (data.cashList || []).length + '件）', listTable(listHeaders, cashRows)) +
      '<p class="no-print" style="margin-top:20px;color:#6b7280;">ブラウザの印刷ダイアログから PDF 保存もできます。</p>' +
      '</body></html>';
  }

  function openHonobonoPrintPreview() {
    var month = requireTargetMonth();
    if (!month) return;
    if (state.honobonoDraft.dirty) {
      if (!window.confirm('未保存の変更があります。保存済みの内容で印刷します。続けますか？')) return;
    }

    var win = window.open('about:blank', '_blank');
    if (!win) {
      showMessage('ポップアップがブロックされました。ブラウザの設定を確認してください。', 'error');
      return;
    }
    win.document.open();
    win.document.write('<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>読み込み中</title></head>' +
      '<body style="font-family:sans-serif;padding:24px;color:#374151;">印刷データを読み込んでいます...</body></html>');
    win.document.close();

    runServerSilent('getHonobonoBillingPrintView', month).then(function(data) {
      win.document.open();
      win.document.write(buildHonobonoPrintHtml_(data));
      win.document.close();
      win.focus();
      window.setTimeout(function() { win.print(); }, 400);
    }).catch(function(error) {
      try { win.close(); } catch (e) {}
      handleImportError(error);
    });
  }

  function initActions() {
    $('load-month-button').addEventListener('click', reloadMonth);

    $('honobono-save-button').addEventListener('click', function() {
      saveHonobonoBillingDraft();
    });

    $('honobono-print-button').addEventListener('click', function() {
      openHonobonoPrintPreview();
    });

    $('billing-name-search-input').addEventListener('input', function(event) {
      handleBillingNameSearchInput(event.target.value);
    });

    $('honobono-sort').addEventListener('change', function() {
      renderHonobonoBillingRows('honobono-billing-table-wrap', getSortedHonobonoDisplayRows(), true);
    });

    $('cash-search-input').addEventListener('input', function(event) {
      handleCashSearchInput(event.target.value);
    });

    $('reconcile-sort').addEventListener('change', function() {
      renderReconcileTable(state.reconcile);
    });

    $('honobono-import-button').addEventListener('click', function() {
      var month = requireTargetMonth();
      if (!month) return;
      readFile($('honobono-file')).then(function(csvText) {
        return runServer('importHonobonoCsv', month, csvText);
      }).then(function(result) {
        if (!result) {
          showMessage('取込処理の応答がありませんでした。読み込みで取込結果を確認してください。', 'info');
          return reloadMonthSnapshot();
        }
        if (result.diff) {
          var diff = result.diff;
          var html = '<h3>再取込差分</h3><ul>';
          (diff.removed || []).forEach(function(item) {
            html += '<li>削除: ' + item.matchId + '（前回 ' + formatYen(item.previousAmount) + '）</li>';
          });
          (diff.added || []).forEach(function(item) {
            html += '<li>追加: ' + item.matchId + '（' + formatYen(item.currentAmount) + '）</li>';
          });
          (diff.changed || []).forEach(function(item) {
            html += '<li>金額変更: ' + item.matchId + '（' + formatYen(item.previousAmount) + ' → ' + formatYen(item.currentAmount) + '）</li>';
          });
          html += '</ul>';
          var panel = $('honobono-diff');
          panel.innerHTML = html;
          panel.hidden = false;
        } else {
          var diffPanel = $('honobono-diff');
          if (diffPanel) {
            diffPanel.innerHTML = '';
            diffPanel.hidden = true;
          }
        }
        showMessage('ほのぼの ' + result.count + '件を取込しました。', 'success');
        invalidateMonthCache();
        return reloadMonthSnapshot().then(function() {
          renderHonobonoBillingTable(true);
        });
      }).catch(handleImportError);
    });

    $('eshu-refresh-button').addEventListener('click', function() { renderEshuInputTable(true); });
    $('eshu-sort').addEventListener('change', function() { renderEshuInputTable(true); });

    $('eshu-import-button').addEventListener('click', function() {
      var month = requireTargetMonth();
      if (!month) return;
      readFile($('eshu-file')).then(function(csvText) {
        return runServer('importEshuCsv', month, csvText);
      }).then(function(result) {
        applyImportResult(result, 'e集ちゃん');
        renderReconcileSummaryFromData(result && result.reconcile
          ? result.reconcile.comparisonSummary
          : null);
      }).catch(handleImportError);
    });

    $('reconcile-button').addEventListener('click', function() {
      var month = requireTargetMonth();
      if (!month) return;
      runServerSilent('ensureMasterUserCache').then(function() {
        return runServer('runReconcile', month);
      }).then(function(result) {
        if (!result) {
          showMessage('照合処理の応答がありませんでした。読み込みで結果を確認してください。', 'info');
          return reloadMonthSnapshot();
        }
        applyImportResult(result, '照合');
        renderReconcileSummaryFromData(result && result.reconcile
          ? result.reconcile.comparisonSummary
          : null);
      }).catch(handleImportError);
    });

    $('confirm-button').addEventListener('click', function() {
      var month = requireTargetMonth();
      if (!month) return;
      if (!confirm('この月の請求を確定しますか？')) return;
      runServer('confirmMonth', month).then(function() { return reloadMonth(); });
    });

    $('unconfirm-button').addEventListener('click', function() {
      var month = requireTargetMonth();
      if (!month) return;
      var reason = $('unconfirm-reason').value;
      runServer('unconfirmMonth', month, reason).then(function() { return reloadMonth(); });
    });
  }

  function warmMasterCacheIfNeeded() {
    runServerSilent('getMasterUserCacheStatus').then(function(status) {
      if (status && !status.hasCache) {
        runServerSilent('ensureMasterUserCache').catch(function() {});
      }
    }).catch(function() {});
  }

  function init() {
    initNav();
    initActions();
    runServerSilent('bootstrapApp').then(function(result) {
      if (result && result.version) {
        $('app-version').textContent = 'v' + result.version;
      }
      if ($('ui-build')) $('ui-build').textContent = 'UI ' + UI_BUILD;
      $('target-month').value = defaultTargetMonthValue();
      warmMasterCacheIfNeeded();
      return reloadMonth();
    }).catch(handleImportError);
  }

  document.addEventListener('DOMContentLoaded', init);
})();
</script>
