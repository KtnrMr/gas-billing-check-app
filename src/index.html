<!DOCTYPE html>
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <?!= include('style'); ?>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <h1>請求確定チェック</h1>
        <p id="app-version"></p>
        <p id="ui-build" class="ui-build"></p>
      </div>
      <label class="month-picker">対象月
        <input id="target-month" type="month">
      </label>
      <button id="load-month-button" class="primary block">読み込み</button>
      <nav class="nav">
        <button class="nav-item active" data-screen="honobono">ほのぼの請求整理</button>
        <button class="nav-item" data-screen="cash-master">現金支払いマスタ</button>
        <button class="nav-item" data-screen="eshu-input">e集ちゃん入力</button>
        <button class="nav-item" data-screen="eshu-import">e集ちゃん照合</button>
        <button class="nav-item" data-screen="confirm">確定</button>
      </nav>
      <div id="month-status" class="month-status">未読込</div>
    </aside>

    <main class="main">
      <div id="message" class="message" hidden></div>
      <div id="loading" class="loading" hidden>処理中...</div>

      <section id="screen-honobono" class="screen">
        <header class="screen-header">
          <h2>ほのぼの請求整理</h2>
          <p>CSV取込後、請求区分を整えてから e集ちゃん入力作業へ進みます。</p>
        </header>
        <div class="panel inline-form">
          <label>ほのぼのCSV<input id="honobono-file" type="file" accept=".csv,text/csv"></label>
          <button id="honobono-import-button" class="primary">取込実行</button>
        </div>
        <div id="honobono-diff" class="diff-panel" hidden></div>
        <div class="panel save-bar">
          <button id="honobono-save-button" class="primary" disabled>保存</button>
          <button id="honobono-print-button" type="button">印刷用プレビュー</button>
          <span id="honobono-draft-status" class="draft-status"></span>
        </div>
        <div id="honobono-summary-cards" class="summary-grid"></div>
        <h3 class="section-title">請求一覧</h3>
        <div class="panel inline-form billing-toolbar">
          <label>氏名検索
            <input id="billing-name-search-input" type="search" placeholder="氏名・フリガナ・ID" autocomplete="off">
          </label>
          <label class="checkbox-label checkbox-large"><input id="billing-include-ended" type="checkbox">利用終了者も含める</label>
          <label>並び替え
            <select id="honobono-sort">
              <option value="name" selected>氏名順</option>
              <option value="id">顧客番号順</option>
            </select>
          </label>
        </div>
        <div id="billing-name-search-candidates" class="search-candidates" hidden></div>
        <div id="honobono-billing-table-wrap" class="table-wrap"></div>
      </section>

      <section id="screen-cash-master" class="screen" hidden>
        <header class="screen-header">
          <h2>現金支払いマスタ</h2>
          <p>毎月自動で現金支払い扱いにする利用者を氏名検索で登録します。</p>
        </header>
        <div class="panel inline-form">
          <label>氏名検索
            <input id="cash-search-input" type="search" placeholder="氏名・フリガナ・ID" autocomplete="off">
          </label>
        </div>
        <div id="cash-search-candidates" class="search-candidates" hidden></div>
        <h3 class="section-title">登録済み一覧</h3>
        <div id="cash-master-table-wrap" class="table-wrap"></div>
      </section>

      <section id="screen-eshu-input" class="screen" hidden>
        <header class="screen-header">
          <h2>e集ちゃんⅡ入力作業</h2>
          <p id="last-copy-info">最後にコピー：なし</p>
        </header>
        <div class="panel inline-form">
          <label>並び替え
            <select id="eshu-sort">
              <option value="id">顧客番号順</option>
              <option value="name">氏名順</option>
            </select>
          </label>
          <button id="eshu-refresh-button">再表示</button>
        </div>
        <div id="eshu-input-table-wrap" class="table-wrap"></div>
      </section>

      <section id="screen-eshu-import" class="screen" hidden>
        <header class="screen-header">
          <h2>e集ちゃん照合</h2>
          <p>e集ちゃんⅡから出力したCSVを取り込み、照合します。</p>
        </header>
        <div class="panel inline-form">
          <label>CSVファイル<input id="eshu-file" type="file" accept=".csv,text/csv"></label>
          <button id="eshu-import-button" class="primary">取込・照合</button>
          <button id="reconcile-button">照合のみ再実行</button>
        </div>
        <div id="reconcile-summary-table-wrap" class="reconcile-summary-table-wrap"></div>
        <h3 class="section-title">照合結果</h3>
        <div class="panel inline-form">
          <label>並び替え
            <select id="reconcile-sort">
              <option value="name" selected>氏名順</option>
              <option value="id">顧客番号順</option>
              <option value="judgment">判定順（エラー優先）</option>
            </select>
          </label>
        </div>
        <div id="reconcile-table-wrap" class="table-wrap"></div>
      </section>

      <section id="screen-confirm" class="screen" hidden>
        <header class="screen-header">
          <h2>確定・履歴</h2>
        </header>
        <div class="panel inline-form">
          <button id="confirm-button" class="primary">請求確定</button>
          <label>確定解除理由<input id="unconfirm-reason" type="text" placeholder="解除理由を入力"></label>
          <button id="unconfirm-button">確定解除</button>
        </div>
        <div id="history-table-wrap" class="table-wrap"></div>
      </section>
    </main>
  </div>
  <?!= include('script'); ?>
</body>
</html>
